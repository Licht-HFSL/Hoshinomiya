<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  <!-- ← これを追加 -->
  <title>燦然のペリペティアキャラクター図鑑</title>
 <link rel="stylesheet" href="characters.css"> <!-- CSSを外部ファイルで読み込み -->

</head>
<body>
  <h1>燦然のペリペティア</h1>

 <!-- ヘッダー -->
  <header>
    <nav>
      <a href="index.html">トップ</a>
      <a href="燦然のペリペティア.html">世界概要</a>
      <!-- 必要に応じて作品を追加 -->
    </nav>
  </header>


  <!-- 🔍 検索フォーム -->
  <div class="filters">
    <input type="text" id="searchBox" placeholder="名前で検索">
    <select id="filterWorld">
      <option value="">親（すべて）</option>
    </select>
    <select id="filterCountry">
      <option value="">国（すべて）</option>
    </select>
    <select id="filterRace">
      <option value="">種族（すべて）</option>
    </select>
    <select id="filterAttr">
      <option value="">属性（すべて）</option>
    </select>
    <select id="filterGender">
      <option value="">性別（すべて）</option>
    </select>
  </div>

  <!-- キャラ一覧 -->
  <div class="character-list" id="characterList">
    <!-- ここにキャラカードを貼り付ける（スプレッドシートから生成したHTML） -->




   <script>

const WORLDER = [
  'Licht','暁月フィオナ','ぐみまる','衣依谷','aj🐟',//'mol',//'ドンストップ赤部子',//'米粒',//'ゆうひ',//'🍙',//'白洲尚哉'
];

const RACES = [
];

const ATTR_ORDER = [
  '火属性','雷属性','水属性','氷属性','木属性','風属性','土属性','岩属性','無属性','光属性','闇属性','日属性','月属性','星属性'
];

const GENDER_ORDER = [
  '男性','女性','無'
];

const COUNTRY_ORDER = [
  'ペディニテプラ','シルヒューレ','マルタラット','ヴロモンロス','放浪'
];


let allCharacters = [];

    // JSONファイルの読み込み
    async function loadCharacters() {
      const res = await fetch("sanzen-characters.json"); // JSONファイル名を合わせてね
      const characters = await res.json();
      allCharacters = characters; // ★保持
      renderCharacters(characters);
      populateFilters(characters);
    }

    // HTMLにキャラを描画
    function renderCharacters(characters) {
      const container = document.getElementById("characterList");
      container.innerHTML = "";

      characters.forEach(c => {
        const card = document.createElement("div");
        card.className = "character-card";
        card.dataset.name = c.name;
        card.dataset.world = c.world;
        card.dataset.race = c.race || c.affiliation || c.aaffiliation || "";
        card.dataset.attr = c.attribute;
        card.dataset.gender = c.gender;
        card.dataset.country = c.country;


        card.innerHTML = `
        <a href="${c.detailUrl}">
          <img src="${c.icon}" alt="${c.name}">
          <h3>${c.name}</h3>
         </a>
        `;
        container.appendChild(card);

        
      });
    }

    // フィルタ項目を作成
    function populateFilters(characters) {
      const worlds = new Set();
      const races = new Set();
      const attrs = new Set();
      const genders = new Set();
      const countrys = new Set();

      characters.forEach(c => {
        if (c.world) worlds.add(c.world);
        if (c.race || c.affiliation || c.aaffiliation) races.add(c.race || c.affiliation || c.aaffiliation);
        if (c.attribute) attrs.add(c.attribute);
        if (c.gender) genders.add(c.gender);
        if (c.country) countrys.add(c.country);
      });

      function fillSelect(id, values) {
        const select = document.getElementById(id);
        [...values].forEach(v => {
          const opt = document.createElement("option");
          opt.value = v;
          opt.textContent = v;
          select.appendChild(opt);
        });
      }

        updateRaceByWorld('');

      fillSelect("filterWorld", WORLDER);
      fillSelect("filterAttr", ATTR_ORDER);
      fillSelect("filterGender", GENDER_ORDER);
      fillSelect("filterCountry", COUNTRY_ORDER);
    }

    function updateRaceByWorld(world) {
  const select = document.getElementById("filterRace");

  // 今の選択を退避
  const current = select.value;

  // 初期化
  select.innerHTML = '<option value="">種族（すべて）</option>';

  // 対象キャラを絞る
  const targets = world
    ? allCharacters.filter(c => c.world === world)
    : allCharacters;

  // 種族を抽出（重複防止）
  const set = new Set();
  targets.forEach(c => {
    const r = c.race || c.affiliation || c.aaffiliation;
    if (r) set.add(r);
  });

  // RACES の順番を維持して追加
  // RACES の順番で存在するものを追加し、セットから削除
  RACES.forEach(r => {
    if (set.has(r)) {
      const opt = document.createElement("option");
      opt.value = r;
      opt.textContent = r;
      select.appendChild(opt);
      set.delete(r);
    }
  });

  // RACES にない残りの種族をアルファベット/五十音順で追加
  Array.from(set).sort().forEach(r => {
    const opt = document.createElement("option");
    opt.value = r;
    opt.textContent = r;
    select.appendChild(opt);
  });

  // まだ有効なら選択を復元
  if ([...select.options].some(o => o.value === current)) {
    select.value = current;
  }
}


    // フィルタ機能
    function filterCharacters() {
      const search = document.getElementById('searchBox').value.toLowerCase();
      const world = document.getElementById('filterWorld').value;
      const race = document.getElementById('filterRace').value;
      const attr = document.getElementById('filterAttr').value;
      const gender = document.getElementById('filterGender').value;
      const country = document.getElementById('filterCountry').value;

      document.querySelectorAll('.character-card').forEach(card => {
        const match =
          card.dataset.name.toLowerCase().includes(search) &&
          (!world || card.dataset.world === world) &&
          (!race || card.dataset.race === race) &&
          (!attr || card.dataset.attr === attr) &&
          (!gender || card.dataset.gender === gender) &&
          (!country || card.dataset.country === country);

        card.style.display = match ? 'block' : 'none';
      });
    }

document.addEventListener("input", e => {
  if (!e.target.closest(".filters")) return;

  // ワールドが変わったら種族を更新
  if (e.target.id === "filterWorld") {
    updateRaceByWorld(e.target.value);
  }

  filterCharacters();
});


    document.addEventListener("DOMContentLoaded", loadCharacters);
  </script>

</body>
</html>
